services:
  db:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    environment:
      POSTGRES_DB: zep
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zep"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - zep_db_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.22.0
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - zep_neo4j_data:/data

  graphiti:
    image: zepai/graphiti:0.3
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
    depends_on:
      - neo4j
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  zep:
    image: zepai/zep:latest
    restart: unless-stopped
    environment:
      ZEP_CONFIG_FILE: zep.local.yaml
    depends_on:
      db:
        condition: service_healthy
      graphiti:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./zep.local.yaml:/app/zep.local.yaml:ro

volumes:
  zep_db_data:
  zep_neo4j_data:
